title: RewardsBrief
description: "Your weekly briefing on travel rewards, points hacks, and luxury for less."
baseurl: ""
url: "https://rewardsbrief.com"
author: RewardsBrief Team
email: rewardsbrief@proton.me

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "RewardsBrief"
      currency: "usd"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md

# SEO
lang: en
logo: /assets/images/logo.png
social:
  name: RewardsBrief
  links:
    - https://tiktok.com/@rewardsbrief
    - https://instagram.com/rewardsbrief_
    - https://youtube.com/@rewardsbrief

# Newsletter
newsletter:
  provider: kit
  signup_url: "https://rewardsbrief.kit.com/df211f260b"

# Analytics
google_analytics: G-H92M39MBKQ