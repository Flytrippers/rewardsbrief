<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  {% feed_meta %}
</head>
<body>
  <header class="site-header">
    <div class="container nav-container">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <span class="word-rewards">Rewards</span><span class="word-brief">Brief</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">home</a>
        <a href="{{ '/about' | relative_url }}">about</a>
        <a href="{{ '/archive' | relative_url }}">archive</a>
        <a href="{{ site.newsletter.signup_url }}" class="nav-cta">subscribe →</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© {{ 'now' | date: '%Y' }} RewardsBrief. All rights reserved.</p>
      <p class="footer-links">
        <a href="https://tiktok.com/@rewardsbrief">TikTok</a>
        <a href="https://instagram.com/@rewardsbrief_">Instagram</a>
        <a href="https://youtube.com/@rewardsbrief">YouTube</a>
      </p>
      <p class="disclaimer">Some links may earn RewardsBrief a commission. The math stays the math.</p>
    </div>
  </footer>
</body>
</html>
