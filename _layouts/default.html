<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  {% feed_meta %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/archive' | relative_url }}">Archive</a>
        <a href="{{ site.newsletter.signup_url }}" class="nav-cta">Subscribe</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© {{ 'now' | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
      <p>
        <a href="https://tiktok.com/@rewardsbrief">TikTok</a> •
        <a href="https://instagram.com/rewardsbrief">Instagram</a> •
        <a href="https://youtube.com/@rewardsbrief">YouTube</a>
      </p>
      <p class="disclaimer">Disclaimer: Offers are subject to change. We may receive compensation when you click links to products.</p>
    </div>
  </footer>
</body>
</html>
