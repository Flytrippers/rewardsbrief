<!-- Inline Newsletter Signup -->
<div class="inline-signup" id="subscribe">
  <form action="https://app.kit.com/forms/9382002/subscriptions" method="POST" target="_blank" class="signup-form">
    <input 
      type="email" 
      name="email_address" 
      placeholder="your@email.com" 
      required
      autocomplete="off"
      class="signup-input"
      aria-label="Email address"
    >
    <button type="submit" class="btn btn-primary signup-btn">subscribe →</button>
  </form>
  <p class="signup-note">One email per week. No spam. Unsubscribe anytime.</p>
</div>
